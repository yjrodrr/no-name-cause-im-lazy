<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <script>
    if (sessionStorage.getItem("puzzle1_solved") !== "true") {
      window.location.replace("index.html");
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      background: #080808;
      color: #e8e8e0;
      font-family: 'Courier Prime', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .center {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 24px;
      animation: fadeIn 1s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .equation-row {
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: 'Courier Prime', monospace;
      font-size: clamp(2rem, 5vw, 3.2rem); /* main text */
      font-weight: 700;
      color: #e8e8e0;
      white-space: nowrap;
    }
    input[type="text"] {
      background: transparent;
      border: 1px solid #444;
      border-radius: 10px;
      outline: none;
      color: #e8e8e0;
      font-family: monospace;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 400;
      letter-spacing: 0.2em;
      text-align: center;
      width: clamp(80px, 12vw, 120px);
      padding: 10px 16px;
      caret-color: #e8e8e0;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      border-color: #888;
    }
    input[type="text"]::placeholder {
      color: #333;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="equation-row">
      <span>73 / 65 = 37</span>
    </div>
    <div class="equation-row">
      <span>95 / 16 =</span>
      <input type="text" id="answer" placeholder="..." autocomplete="off" spellcheck="false" />
    </div>
  </div>
  <script>
    const input = document.getElementById("answer");

    const _h2 = "GRk=";
    const _k  = 42;

    function _d(s) {
      return atob(s).split("").map(c => String.fromCharCode(c.charCodeAt(0) ^ _k)).join("");
    }

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        if (input.value === _d(_h2)) {
          sessionStorage.setItem("puzzle2_solved", "true");
          window.location.href = "trio.html";
        }
        return;
      }
      if (
        !/^[0-9]$/.test(e.key) &&
        !["Backspace","Delete","ArrowLeft","ArrowRight","Tab"].includes(e.key)
      ) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
