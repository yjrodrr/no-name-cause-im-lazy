<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      background: #080808;
      color: #e8e8e0;
      font-family: 'Courier Prime', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn 1s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .title {
      font-family: 'Courier Prime', monospace;
      font-size: clamp(2rem, 5vw, 3.2rem);
      margin-left: 0.5vw;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #e8e8e0;
      white-space: nowrap;
    }
    input[type="text"] {
      background: transparent;
      border: 1px solid #444;
      border-radius: 10px;
      outline: none;
      color: #e8e8e0;
      font-family: monospace;
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      font-weight: 400;
      letter-spacing: 0.2em;
      text-align: center;
      width: clamp(180px, 32vw, 300px);
      padding: 14px 20px;
      caret-color: #e8e8e0;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      border-color: #888;
    }
    input[type="text"]::placeholder {
      color: #333;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="title">18 6 24 15 12 |c</div>
    <input type="text" id="answer" placeholder="..." autocomplete="off" spellcheck="false" />
  </div>

  <script>
    const input = document.getElementById("answer");

    input.addEventListener("input", () => {
      input.value = input.value.replace(/[^a-zA-Z]/g, "");
    });

    const _h = "RUlfRkM=";
    const _k = 42;

    function _d(s) {
      return atob(s).split("").map(c => String.fromCharCode(c.charCodeAt(0) ^ _k)).join("");
    }

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        if (input.value.toLowerCase() === _d(_h)) {
          sessionStorage.setItem("puzzle1_solved", "true");
          window.location.href = "duo.html";
        }
        return;
      }
      if (
        !/^[a-zA-Z]$/.test(e.key) &&
        !["Backspace","Delete","ArrowLeft","ArrowRight","Tab"].includes(e.key)
      ) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
